<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Secure sign-in for PTA Student Job Hub." />
    <title>PTA Student Job Hub | Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css?v=20260514c" />
  </head>
  <body data-page="login">
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="/" aria-label="PTA Student Job Hub home">
          <span class="brand-mark">PT</span>
          <span>PTA Student Job Hub</span>
        </a>
      </div>
    </header>

    <main>
      <div class="container auth-shell">
        <section class="auth-card" aria-labelledby="loginTitle">
          <h1 id="loginTitle">Sign In</h1>
          <p class="auth-subtext">Only approved users can manage job listings. Public visitors can still view jobs.</p>
          <form id="loginForm" class="auth-form">
            <label for="loginEmail">Email</label>
            <input id="loginEmail" type="email" autocomplete="username" required />

            <label for="loginPassword">Password</label>
            <input id="loginPassword" type="password" autocomplete="current-password" required />

            <button class="btn btn-primary" type="submit">Sign In</button>
          </form>
          <p class="auth-message" id="loginMessage" aria-live="polite"></p>
          <p class="auth-note">Default admin account: enachealex1@gmail.com (temporary password 1234).</p>
        </section>
      </div>
    </main>

    <footer class="footer">
      <div class="container">
        <small>PTA Student Job Hub | <span data-year></span></small>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/app-config.js?v=20260514c"></script>
    <script src="/script.js?v=20260514c"></script>
  </body>
</html>
